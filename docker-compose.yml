version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: wms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wms_db
      MYSQL_USER: wms_user
      MYSQL_PASSWORD: wms_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - wms-network

  # Redis缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: wms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wms-network

  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wms-server
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: wms_db
      DB_USER: wms_user
      DB_PASSWORD: wms_password
      JWT_SECRET: your-secret-key-change-in-production
      CLIENT_URL: http://localhost:80
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wms-network
    restart: unless-stopped

  # 网页端
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: wms-web
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - wms-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  wms-network:
    driver: bridge
